<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 – Bánki Diáknap</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/logo-dark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 0;
    }

    .error-code {
      font-size: clamp(120px, 28vw, 280px);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: var(--red);
      user-select: none;
      position: relative;
    }

    .error-code::after {
      content: attr(data-code);
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px color-mix(in srgb, var(--red) 30%, transparent);
      transform: translate(4px, 6px);
      z-index: -1;
    }

    .error-label {
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .error-title {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .error-sub {
      font-size: clamp(14px, 2vw, 17px);
      color: var(--text-muted);
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--red);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .error-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .error-btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code" data-code="500">500</div>
    <p class="error-label">Szerverhiba</p>
    <h1 class="error-title">Nem a te hibád.</h1>
    <p class="error-sub">Nálunk romlott el valami. Próbáld újra egy kis idő múlva – mi meg megoldjuk addig.</p>
    <a href="/" class="error-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Újrapróbálom
    </a>
  </div>

  <script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
