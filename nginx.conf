# /etc/nginx/sites-available/diaknap
# ln -s /etc/nginx/sites-available/diaknap /etc/nginx/sites-enabled/diaknap

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name diaknap.DOMAIN.hu;                              # TODO: valós domain

    root /var/www/html/diaknap;                                  # TODO: valós webroot
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN.hu/fullchain.pem;   # TODO
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN.hu/privkey.pem;     # TODO

    # ── Biztonsági headerek ──────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline';
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self';
         frame-src https://www.youtube.com;
         connect-src 'self';
         base-uri 'self';
         form-action 'self';
         frame-ancestors 'self';"
        always;

    # ── Clean URLs (nincs .html) ─────────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Hibaoldalak ──────────────────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
    location = /404.html { internal; }
    location = /500.html { internal; }

    # ── Cache ─────────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name diaknap.DOMAIN.hu;                              # TODO: valós domain
    return 301 https://$host$request_uri;
}
